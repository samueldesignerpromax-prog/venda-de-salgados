<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - Salgados Brasil</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo"><h1><i class="fas fa-drumstick-bite"></i> Salgados <span>Brasil</span></h1></div>
            <nav class="navbar">
                <ul>
                    <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="cardapio.html"><i class="fas fa-utensils"></i> Cardápio</a></li>
                    <li><a href="carrinho.html" class="active"><i class="fas fa-shopping-cart"></i> Carrinho <span id="cart-count" class="cart-badge">0</span></a></li>
                    <li><a href="sobre.html"><i class="fas fa-heart"></i> Sobre</a></li>
                </ul>
            </nav>
            <div class="mobile-menu-btn"><i class="fas fa-bars"></i></div>
        </div>
    </header>

    <main class="container">
        <section class="cart-section">
            <h2><i class="fas fa-shopping-cart"></i> Meu Carrinho</h2>
            <div id="cart-items" class="cart-container"></div>
            <div id="cart-empty" class="cart-empty" style="display:none;">
                <i class="fas fa-shopping-basket"></i>
                <h3>Seu carrinho está vazio</h3>
                <p>Que tal adicionar alguns salgados deliciosos?</p>
                <a href="cardapio.html" class="btn btn-primary">Ver Cardápio</a>
            </div>
            <div id="cart-summary" class="cart-summary"></div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo"><h2><i class="fas fa-drumstick-bite"></i> Salgados Brasil</h2></div>
                <div class="footer-contact"><h3>Contato</h3><p><i class="fab fa-whatsapp"></i> (11) 99999-9999</p></div>
            </div>
            <div class="footer-bottom"><p>&copy; 2025 Salgados Brasil</p></div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
